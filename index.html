
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axolotech — Lake Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <span class="logo">Axolotech</span>
      <span class="logo-sub">Lake Monitoring System</span>
    </div>
    <div class="topbar-right">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-label" id="status-label">Connecting...</span>
      <span class="last-seen" id="last-seen"></span>
    </div>
  </header>

  <main class="dashboard">

    <!-- Top metric cards -->
    <section class="cards">

      <div class="card card--ph" id="card-ph">
        <div class="card-label">pH Level</div>
        <div class="card-value" id="val-ph">—</div>
        <div class="card-unit">pH</div>
        <div class="card-range" id="range-ph"></div>
        <div class="card-badge" id="badge-ph"></div>
      </div>

      <div class="card card--temp" id="card-temp">
        <div class="card-label">Temperature</div>
        <div class="card-value" id="val-temp">—</div>
        <div class="card-unit">°C</div>
        <div class="card-range" id="range-temp"></div>
        <div class="card-badge" id="badge-temp"></div>
      </div>

      <div class="card card--axolotl" id="card-axolotl">
        <div class="card-label">Axolotl Presence</div>
        <div class="card-presence" id="val-presence">—</div>
        <div class="card-confidence" id="val-confidence"></div>
      </div>

      <div class="card card--stats">
        <div class="card-label">Session</div>
        <div class="stat-row">
          <span class="stat-name">Readings</span>
          <span class="stat-val" id="stat-count">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-name">Detections</span>
          <span class="stat-val" id="stat-detections">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-name">pH alerts</span>
          <span class="stat-val" id="stat-ph-alerts">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-name">Temp alerts</span>
          <span class="stat-val" id="stat-temp-alerts">0</span>
        </div>
      </div>

    </section>

    <!-- Charts -->
    <section class="charts">

      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">pH over time</span>
          <span class="chart-subtitle" id="chart-ph-range"></span>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-ph"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">Temperature over time</span>
          <span class="chart-subtitle" id="chart-temp-range"></span>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-temp"></canvas>
        </div>
      </div>

    </section>

    <!-- Raw message log -->
    <section class="log-section">
      <div class="log-header">
        <span class="chart-title">Message log</span>
        <button class="btn-clear" onclick="App.clearLog()">Clear</button>
      </div>
      <div class="log" id="log"></div>
    </section>

  </main>

  <!-- CDN libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>

  <!-- App -->
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
